<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка файлов</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --success-color: #4bb543;
            --danger-color: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .file-upload-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .file-upload-container h1 {
            color: var(--dark-color);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .file-upload-container p {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #ced4da;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background-color: rgba(67, 97, 238, 0.05);
        }

        .upload-area.active {
            border-color: var(--success-color);
            background-color: rgba(75, 181, 67, 0.05);
        }

        .upload-icon {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .file-info {
            display: none;
            align-items: center;
            justify-content: space-between;
            background-color: var(--light-color);
            border-radius: 6px;
            padding: 12px 15px;
            margin-top: 15px;
        }

        .file-info.show {
            display: flex;
        }

        .file-name {
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .file-icon {
            margin-right: 10px;
            color: var(--primary-color);
        }

        .file-actions {
            display: flex;
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            margin-left: 10px;
        }

        .btn-outline:hover {
            background-color: var(--danger-color);
            color: white;
        }

        .btn i {
            margin-right: 8px;
        }

        #fileInput {
            display: none;
        }

        .drag-text {
            font-weight: 500;
            color: var(--dark-color);
        }

        .drag-text span {
            color: var(--primary-color);
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .file-upload-container {
                padding: 25px;
            }

            .upload-area {
                padding: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="file-upload-container">
        <h1>Загрузите ваш файл</h1>
        <p>Перетащите файл в область ниже или нажмите для выбора</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">
                <i class="fas fa-cloud-upload-alt"></i>
            </div>
            <div class="drag-text" id="dragText">
                Перетащите файл сюда или <span>выберите файл</span>
            </div>
            <input type="file" id="fileInput">

            <div class="file-info" id="fileInfo">
                <div class="file-name">
                    <i class="fas fa-file-alt file-icon"></i>
                    <span id="fileName">Файл не выбран</span>
                </div>
                <div class="file-actions">
                    <button class="btn btn-outline" id="removeBtn">
                        <i class="fas fa-times"></i> Удалить
                    </button>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" id="uploadBtn" disabled>
            <i class="fas fa-upload"></i> Загрузить файл
        </button>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const dragText = document.getElementById('dragText');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const removeBtn = document.getElementById('removeBtn');
        const uploadBtn = document.getElementById('uploadBtn');

        // Клик по области загрузки
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Обработка выбора файла
        fileInput.addEventListener('change', function() {
            if(this.files.length > 0) {
                handleFileSelection(this.files[0]);
            }
        });

        // Перетаскивание файла
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight() {
            uploadArea.classList.add('active');
        }

        function unhighlight() {
            uploadArea.classList.remove('active');
        }

        uploadArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const file = dt.files[0];
            handleFileSelection(file);
        }

        function handleFileSelection(file) {
            fileName.textContent = file.name;
            fileInfo.classList.add('show');
            dragText.style.display = 'none';
            uploadBtn.disabled = false;
        }

        // Удаление файла
        removeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            fileInput.value = '';
            fileName.textContent = 'Файл не выбран';
            fileInfo.classList.remove('show');
            dragText.style.display = 'block';
            uploadBtn.disabled = true;
        });

        // Загрузка файла (здесь можно добавить AJAX запрос)
        uploadBtn.addEventListener('click', function() {
            if(fileInput.files.length > 0) {
                // Здесь код для отправки файла на сервер
                alert('Файл "' + fileInput.files[0].name + '" успешно загружен!');
            }
        });
    </script>
</body>
</html>
