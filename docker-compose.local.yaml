version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    entrypoint: '/entrypoint.sh'
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      # Volume for local development - sync code changes
      - ./cocktails:/cocktails
      - media_data:/cocktails/media/
      - tmp_data:/cocktails/tmp/
      - static_data:/cocktails/static/
      - redis_socket:/redis_socket
    ports:
      - "${PORT:-8000}:8000"
    networks:
      - cocktails_corp_network
    # Remove restart: always for local development

  db:
    image: postgres:15-alpine
    hostname: postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - cocktails_corp_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 50s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    build:
      context: .
      dockerfile: docker/redis/Dockerfile
    command:
      - /var/lib/redis/redis.conf
    restart: always
    volumes:
      - ./docker/redis/redis.conf:/var/lib/redis/redis.conf:ro
      - redis_data:/data
      - redis_socket:/redis_socket
    networks:
      - cocktails_corp_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 1m20s
      timeout: 5s
      retries: 3

  celery-worker:
    container_name: celery_worker_container_local
    build:
      context: .
      dockerfile: docker/celery_worker/Dockerfile
    env_file:
      - .env
    command: celery -A main_core worker --loglevel=info
    depends_on:
      - redis
      - web
    volumes:
      # Volume for local development - sync code changes for celery workers too
      - ./cocktails:/cocktails
    networks:
      - cocktails_corp_network

  celery-beat:
    container_name: celery_beat_container_local
    build:
      context: .
      dockerfile: docker/celery_beat/Dockerfile
    env_file:
      - .env
    command:  celery -A main_core beat --loglevel=info
    depends_on:
      - redis
      - celery-worker
    volumes:
      # Volume for local development - sync code changes for celery beat too
      - ./cocktails:/cocktails
    networks:
      - cocktails_corp_network


networks:
  cocktails_corp_network:

volumes:
  postgres_data:
  static_data:
  media_data:
  tmp_data:
  redis_data:
  redis_socket:
